services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sqlpreshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sqlpreshift}
      POSTGRES_DB: ${POSTGRES_DB:-sqlpreshift}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sqlpreshift}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 데모용 독립 DB 컨테이너(ERP/Pagila) ──
  # 앱에서 일반 DB 연결 폼으로 붙는 실제 PostgreSQL. 호스트 포트로 노출(localhost:5433/5434).
  # 메타 DB(postgres:5432/sqlpreshift)와 물리 분리 — 앱 인프라 오염 금지(AGENTS.md 가드).
  pg_erp:
    # ERP 샘플(92테이블). 선언적 initdb SQL 자동 적재 — Pagila와 대칭 구조(재현 가능·결정적).
    # 01-schema → 02-data → 03-defects 순 실행. NOT VALID FK는 데이터 적재 후 03에서 붙어
    # 고아값/결함이 박제된다(broken-RI 진단 데모). seed_erp.py는 이 덤프의 생성기로 보존.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: erp
    ports:
      - "5433:5432"
    volumes:
      - pgdata_erp:/var/lib/postgresql/data
      - ./samples/erp/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./samples/erp/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./samples/erp/03-defects.sql:/docker-entrypoint-initdb.d/03-defects.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  pg_pagila:
    # Pagila 샘플 전용. init SQL을 첫 기동에 자동 적재(런타임 시드 불필요).
    # 01-schema → 02-data 순으로 알파벳 실행. 빈 volume 첫 기동에만 실행됨(재적재 시 down -v 필요).
    # USER=postgres — Pagila 덤프가 "OWNER TO postgres"를 전제하므로 user를 맞춰야 무수정 로드된다.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pagila
    ports:
      - "5434:5432"
    volumes:
      - pgdata_pagila:/var/lib/postgresql/data
      - ./samples/pagila/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./samples/pagila/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pagila"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Ollama 는 호스트에서 직접 구동(ollama serve) — Mac Metal GPU 가속 + 모델 공유.
  # 컨테이너는 host.docker.internal 로 호스트 Ollama 에 접속한다.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app_meta.db}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-postgresql+psycopg://sqlpreshift:sqlpreshift@postgres:5432/sqlpreshift}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:latest}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3:latest}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # 메타 테이블은 앱 기동(lifespan)에서 create_meta_tables로 보장 — SQLite는 alembic 불필요
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  pgdata_erp:
  pgdata_pagila:
