services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sqlpreshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sqlpreshift}
      POSTGRES_DB: ${POSTGRES_DB:-sqlpreshift}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sqlpreshift}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama 는 호스트에서 직접 구동(ollama serve) — Mac Metal GPU 가속 + 모델 공유.
  # 컨테이너는 host.docker.internal 로 호스트 Ollama 에 접속한다.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sqlpreshift:sqlpreshift@postgres:5432/sqlpreshift}
      TARGET_DATABASE_URL: ${TARGET_DATABASE_URL:-postgresql+psycopg://sqlpreshift:sqlpreshift@postgres:5432/sqlpreshift}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:latest}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3:latest}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
